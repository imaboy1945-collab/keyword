<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 전략 연구소</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; color: #333; border-left: 5px solid #007bff; padding-left: 12px; margin-bottom: 20px; }
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        th { background: #f1f3f5; font-weight: 600; }
        .kw { text-align: left; font-weight: bold; color: #0056b3; }
        .S { color: #e03131; background: #fff5f5; font-weight: bold; padding: 3px 6px; border-radius: 4px; }
        .A { color: #f08c00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>통합 키워드 분석 결과</h1>
        <div class="table-res">
            <table id="targetTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>키워드</th>
                        <th>PC</th>
                        <th>모바일</th>
                        <th>일평균</th>
                        <th>등급 (비율)</th>
                        <th>총 문서수</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#targetTable tbody');
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const gradeSpan = `<span class="${item.grade}">${item.grade} (${item.ratio})</span>`;
                    tr.innerHTML = `
                        <td>${item.no}</td>
                        <td class="kw">${item.keyword}</td>
                        <td>${item.pc_search.toLocaleString()}</td>
                        <td>${item.mobile_search.toLocaleString()}</td>
                        <td>${item.daily_avg.toLocaleString()}</td>
                        <td>${gradeSpan}</td>
                        <td>${item.blog_total.toLocaleString()}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
    </script>
</body>
</html>
