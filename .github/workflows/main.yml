name: Keyword Analysis Engine

on:
  schedule:
    # KST 07:10 = UTC 22:10
    - cron: "10 22 * * *"
  workflow_dispatch:
    inputs:
      seed_keywords:
        description: "쉼표로 구분한 시드 키워드"
        required: false
        default: "주식정보,생활꿀팁,복지정책,추천여행,건강정보"
      max_keywords:
        description: "분석할 최대 키워드 수"
        required: false
        default: "120"

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Execute Script
        env:
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          NAVER_ACCESS_LICENSE: ${{ secrets.NAVER_ACCESS_LICENSE }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SEED_KEYWORDS: ${{ github.event.inputs.seed_keywords || '주식정보,생활꿀팁,복지정책,추천여행,건강정보' }}
          MAX_KEYWORDS: ${{ github.event.inputs.max_keywords || '120' }}
          MIN_MONTHLY_SEARCH: "50"
          OUTPUT_FILE: "data.json"
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update keyword analysis data"
          git push
