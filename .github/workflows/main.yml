name: Keyword Analysis Engine

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 0시
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Packages
        run: pip install requests
      - name: Execute Script
        env:
          CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          ACCESS_LICENSE: ${{ secrets.NAVER_ACCESS_LICENSE }}
          SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python update_data.py
      - name: Update Data File
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Update keyword data" || exit 0
          git push
